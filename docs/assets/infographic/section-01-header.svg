  <text x="180" y="130" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="700" fill="url(#accent)">MemWal Hybrid MCP Server</text>
  <text x="180" y="175" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#94a3b8">Hybrid Memory Layer for AI Agents</text>
  <line x1="64" y1="210" x2="480" y2="210" stroke="url(#accent)" stroke-width="2"/>
  <text x="64" y="260" font-family="JetBrains Mono, monospace" font-size="14" fill="#64748b">npm @memwalpp/mcp@0.1.1</text>
