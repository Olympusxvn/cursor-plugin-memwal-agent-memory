  <text x="84" y="260" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">SQLite at ~/.memwal-agent-memory/mcp</text>
  <text x="84" y="285" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">Instant remember / recall / search</text>
  <text x="84" y="310" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">No keys required (Pro Local tier)</text>
  <rect x="620" y="190" width="516" height="160" rx="12" fill="#141414" stroke="rgba(167,139,250,0.2)" stroke-width="1" filter="url(#glow_s1)"/>
  <text x="640" y="230" font-family="Inter, sans-serif" font-size="18" font-weight="600" fill="#a78bfa">Walrus Verifiable</text>
  <text x="640" y="260" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">Encrypted blobs via MemWal relayer</text>
  <text x="640" y="285" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">Explicit sync - not auto-upload</text>
  <text x="640" y="310" font-family="Inter, sans-serif" font-size="14" fill="#94a3b8">Layered verify + lineage + proof</text>
  </g>
